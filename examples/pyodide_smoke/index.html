<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pbt Pyodide Runner</title>
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2025.11.2/core.css"
    />
    <script
      type="module"
      src="https://pyscript.net/releases/2025.11.2/core.js"
    ></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f0e8;
        --panel: #fffdf8;
        --ink: #1d1a16;
        --muted: #675f56;
        --accent: #b14d22;
        --ok: #17633a;
        --fail: #8f1d1d;
        --border: #d7cbbb;
      }

      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        background:
          radial-gradient(circle at top left, rgba(177, 77, 34, 0.12), transparent 30%),
          linear-gradient(180deg, #f7f3ec 0%, var(--bg) 100%);
        color: var(--ink);
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 20px 80px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 0.95;
      }

      p {
        color: var(--muted);
        font-size: 1.05rem;
      }

      .panel {
        margin-top: 28px;
        padding: 20px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 12px 40px rgba(29, 26, 22, 0.06);
      }

      .status {
        margin: 0 0 16px;
        font-weight: 700;
      }

      .ok {
        color: var(--ok);
      }

      .fail {
        color: var(--fail);
      }

      .controls {
        display: grid;
        gap: 12px;
      }

      label {
        font-weight: 700;
      }

      textarea {
        width: 100%;
        min-height: 180px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        background: #fff;
        color: var(--ink);
        font: 0.95rem/1.45 "SFMono-Regular", Consolas, monospace;
      }

      button {
        width: fit-content;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--accent);
        color: #fff9f3;
        font: 700 0.95rem/1 "Helvetica Neue", sans-serif;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      pre {
        margin: 0;
        overflow-x: auto;
        padding: 16px;
        border-radius: 12px;
        background: #201c18;
        color: #f7efe5;
        font: 0.9rem/1.45 "SFMono-Regular", Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>pbt browser runner</h1>
      <p>
        This page loads the local <code>pbt</code> package into PyScript,
        sends a single inline model to <code>pbt.run(models_from_dict=...)</code>,
        and shows the returned results. The default model uses
        <code>skip_and_set_to_value</code> so no LLM is required.
      </p>

      <section class="panel">
        <p id="status" class="status">Loading Python runtime...</p>
        <div class="controls">
          <label for="model-source">Model source for <code>modelinclude</code></label>
          <textarea id="model-source">{{ skip_and_set_to_value("") }}</textarea>
          <button id="run-model" disabled>Run in pbt</button>
        </div>
      </section>

      <section class="panel">
        <pre id="output">Waiting for PyScript...</pre>
      </section>
    </main>

    <script type="py" src="./main.py" config="./pyscript.json"></script>
  </body>
</html>
